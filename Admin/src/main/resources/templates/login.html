<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>login</title>
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:title" content="">
    <meta property="og:type" content="">
    <meta property="og:url" content="">
    <meta property="og:image" content="">
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="/admin/imgs/images/asw.jpg">
    <!-- Template CSS -->
    <link href="/admin/css/main.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .background-container {
            background-image: url(/admin/imgs/images/login.jpeg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>

</head>

<body>
<main class="background-container">
    <header class="main-header style-2 navbar" style="background: black;margin-bottom: 60px;height: 20px" >
        <div class="col-brand" style="margin-bottom: 20px;height: 18px">

            <div style="margin-left: 620px">
                <p style="font-weight: bolder;font-size: xx-large;color: white;font-style: italic">Cosmic-Craft</p>
            </div>
            <a href="index.html" class="brand-wrap mx-auto" style="margin-right: 400px;height: 10px">
                <img src="/admin/imgs/images/asw.jpg"  alt="CosmicCraft Dashboard" style="width: 40px;height: 30px">
            </a>

        </div>

    </header>


            <div class="card-body"  style="margin-left: 600px;margin-top: 150px;width: 350px;border:1px solid;border-radius: 20px;background-color: rgba(0, 0, 0, 0.7);">
                <h4 class="card-title mb-4" style="text-align: center;"><p style="color: whitesmoke;font-weight: bolder">Admin Login</p></h4>
                <div  th:if="${param.error}" style="border-radius: 20px">
                    <div class="alert col=xs-offset-1 col-xs-10" style="border-radius: 40px;background-color: red ;color: white">
                        Sorry:you entered invalid username/password</div>
                </div>
                <div  th:if="${param.logout}">
                    <div class="alert col=xs-offset-1 col-xs-10" style="background-color: green;color: white">
                        You have been logged out</div>
                </div>

                <form action="#" th:action="@{/authenticateTheUser}" method="post" >
                    <div class="mb-3">
                        <input class="form-control" name="username" placeholder="email" type="text">
                    </div> <!-- form-group// -->
                    <div class="mb-3" style="margin-top: 20px">
                        <input class="form-control" name="password" placeholder="Password" type="password">
                    </div>


                    <div class="mb-4" style="margin-left: 1px">
                        <button type="submit" class="btn w-100" style="background-color: red;border-radius: 30px;color: white"> Login </button>
                    </div> <!-- form-group// -->
                </form>

            </div>



</main>
<script src="/admin/js/vendors/jquery-3.6.0.min.js"></script>
<script src="/admin/js/vendors/bootstrap.bundle.min.js"></script>
<script src="/admin/js/vendors/jquery.fullscreen.min.js"></script>
<!-- Maicript/admin -->
<script src="/admin/js/main.js" type="text/javascript"></script>
</body>

</html>
