<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" th:href="@{/fonts/material-design-iconic-font/css/material-design-iconic-font.min.css}">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-image: url(https://i.dell.com/is/image/DellContent/content/dam/ss2/product-images/page/campaign/alienware/gaming/m18-aw3423dw-aw920k-aw720m-aw920h-xml-prestige-pursuer-front-4000x2250.jpg?fmt=jpg&wid=4000&hei=2250);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        #formse{
            background-color: rgba(0, 0, 0, 0.7);
        }



    </style>

</head>

<body>

<div class="wrapper">
    <div class="inner">


        <form th:action="@{/sendVerificationEmailOtp}" id="formse" method="post" style="border: 1px solid;width: 400px;margin-left: 500px;margin-top: 150px" >


            <div class="d-flex align-items-center mb-3 pb-1">
                <i class="fas fa-cubes fa-2x me-3" style="color: #ff6219;"></i>
                <span class="h1 fw-bold mb-0"></span>
            </div>

            <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;margin-left: 40px;font-style: italic;font-size: large;font-weight: bolder;color: white">Email Verification</h5>

            <div class="form-outline mb-4" style="width: 300px;margin-left: 30px">
                <input type="email" id="form2Example17" placeholder="Enter the Email for OTP" class="form-control form-control-lg" name="email" required/>
            </div>


            <div  th:if="${param.error}">
                <div class="alert alert-danger col=xs-offset-1 col-xs-10">
                    Sorry: enter valid email</div>

            </div>
            <div  th:if="${param.exist}">
                <div class="alert alert-danger col=xs-offset-1 col-xs-10">
                    email already exist</div>

            </div>
            <div th:if="${param.existUser}">
                <div class="alert alert-danger">email already exist !</div>
            </div>


            <div class="pt-1 mb-4">
                <button class="btn btn-lg btn-block text-light" type="submit" style="background-color: #C8046C;margin-left: 120px">Submit</button>

            </div>
            <a th:href="@{/}"><span style="margin-left: 110px;margin-bottom:5px;font-style: italic;font-size: large;font-weight: bolder;color: white">Back to Home</span></a><br>



        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
