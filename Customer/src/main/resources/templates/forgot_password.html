<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Forgot password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- MATERIAL DESIGN ICONIC FONT -->
    <link rel="stylesheet" th:href="@{/login/fonts/material-design-iconic-font/css/material-design-iconic-font.min.css}">

    <!-- STYLE CSS -->
    <link rel="stylesheet" th:href="@{/login/css/style.css}">
    <style>
        #bod{
            background-image: url(https://i.dell.com/is/image/DellContent/content/dam/ss2/product-images/page/campaign/alienware/gaming/awr15-aw3423dw-aw510k-aw620m-aw720h-xml-enthusiast-front.jpg?fmt=jpg&wid=4000&hei=2249);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            height: 100%;
        }
        .transparent-bg {
            background-color: rgba(0, 0, 0, 0.7); /* Adjust the alpha value for transparency */
            height: 300px;
            border-radius: 30px;
            padding: 20px; /* Adjust the padding as needed */
        }

        .form-control {
            color: white; /* Set text color to white */
        }

    </style>
</head>

<body class="bg-light" id="bod">
<section class="pt-150 pb-150" style="margin-top: -300px">
    <div class="container" >
        <div class="row justify-content-center" >
            <div class="col-lg-5" >
                <div class="login_wrap widget-taber-content p-30 background-white border-radius-10 mb-md-5 mb-lg-0 mb-sm-5">
                    <div class="padding_eight_all bg-white transparent-bg mb-145" style="height: 300px;border-radius: 30px;margin-bottom: 700px">
                        <div class="heading_s1 text-center" style="margin-top: 650px;margin-bottom: 40px" >
                            <h3 class="mb-10 text-white">Forgot Password</h3>
                        </div>
                        <div th:if="${message != null}" class="text-center">
                            <p class="text-warning" th:text="${message}"></p>
                        </div>

                        <form method="POST" th:action="@{/forgot_password}" class="text-center">

                            <div class="mb-3 text-warning">
                                <p style="font-weight: bolder">
                                    We will be sending a link to your email
                                </p>
                            </div>
                            <div class="form-group" style="width: 400px;margin-left: 60px">
                                <input type="email" name="email" placeholder="Enter Your Email" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-danger btn-fill-out btn-block hover-up" style="margin-top: 20px">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
